<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Avatar raccolti · Super Yac World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: radial-gradient(130% 130% at 50% 0%, #241629, #0c0810) no-repeat; min-height: 100vh; color: #f7f1e8; padding: 28px 20px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    p.sub { opacity: .7; margin: 0 0 18px; font-size: 14px; }
    .bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
    input { background: #1a121f; border: 2px solid #ffffff33; color: #fff; border-radius: 999px; padding: 9px 16px; font-size: 14px; outline: none; min-width: 220px; }
    button { background: #F2C53D; color: #1a121f; border: 0; border-radius: 999px; padding: 9px 18px; font-weight: 700; font-size: 14px; cursor: pointer; }
    button.ghost { background: transparent; color: #f7f1e8; border: 2px solid #ffffff33; }
    .msg { font-size: 14px; margin: 8px 0; }
    .bad { color: #ff9b9b; } .ok { color: #7CD992; } .warn { color: #F2C53D; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; margin-top: 10px; }
    .card { background: #1a121f; border: 1px solid #ffffff1f; border-radius: 14px; padding: 12px; }
    .thumb { width: 100%; aspect-ratio: 1; border-radius: 10px; background: #0d0a12 center/contain no-repeat; image-rendering: auto; }
    .nm { font-weight: 700; font-size: 14px; margin-top: 8px; }
    .meta { font-size: 11px; opacity: .8; margin-top: 3px; word-break: break-word; }
    .dl { display: inline-block; margin-top: 8px; font-size: 12px; color: #F2C53D; text-decoration: none; }
    a { color: #F2C53D; }
  </style>
</head>
<body>
  <h1>🖼️ Eroi pubblici (community)</h1>
  <p class="sub">Gli eroi creati col consenso social, visibili nella home di tutti. Puoi nasconderne qualcuno (moderazione). Pagina privata, protetta da password.</p>
  <div class="bar">
    <input id="pw" type="password" placeholder="password admin" autocomplete="current-password">
    <button id="go">Apri</button>
    <button id="logout" class="ghost" style="display:none">Esci</button>
  </div>
  <div id="msg" class="msg"></div>
  <div id="grid" class="grid"></div>

  <script>
    var pw = document.getElementById('pw');
    var msg = document.getElementById('msg');
    var grid = document.getElementById('grid');
    var logout = document.getElementById('logout');
    var saved = localStorage.getItem('syw_admin') || '';
    if (saved) pw.value = saved;

    function esc(s) { return (s == null ? '' : String(s)).replace(/[<>&"]/g, function (c) { return { '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[c]; }); }
    function fmt(d) { try { return new Date(d).toLocaleString('it-IT'); } catch (e) { return ''; } }

    function load() {
      var token = pw.value.trim();
      if (!token) { msg.innerHTML = '<span class="warn">Inserisci la password.</span>'; return; }
      msg.textContent = 'Carico…'; grid.innerHTML = '';
      fetch('/api/list-avatars?token=' + encodeURIComponent(token) + '&t=' + Date.now(), { cache: 'no-store' })
        .then(function (r) { return r.json().then(function (j) { return { s: r.status, j: j }; }); })
        .then(function (o) {
          if (o.s === 401) { msg.innerHTML = '<span class="bad">Password errata.</span>'; return; }
          if (o.s !== 200) { msg.innerHTML = '<span class="bad">' + esc(o.j.error || 'Errore') + (o.j.detail ? (' — ' + esc(o.j.detail)) : '') + '</span>'; return; }
          localStorage.setItem('syw_admin', token); logout.style.display = '';
          if (!o.j.items || !o.j.items.length) { msg.innerHTML = '<span class="warn">Ancora nessun avatar raccolto. Appena qualcuno ne genera uno con il consenso social, comparirà qui.</span>'; return; }
          msg.innerHTML = '<span class="ok">' + o.j.count + ' eroi.</span>';
          if (!o.j.items.length) { grid.innerHTML = '<span class="warn">Ancora nessun eroe pubblico. Appena qualcuno ne crea uno col consenso social, comparirà qui (e nella home di tutti).</span>'; return; }
          grid.innerHTML = '';
          o.j.items.forEach(function (it) {
            var card = document.createElement('div'); card.className = 'card';
            if (!it.visible) card.style.opacity = '.45';
            var lines = [];
            if (it.nickname) lines.push('👤 ' + esc(it.nickname));
            if (it.email) lines.push('✉️ ' + esc(it.email));
            if (it.power_id) lines.push('⚡ ' + esc(it.power_id));
            if (it.created_at) lines.push('🕒 ' + esc(fmt(it.created_at)));
            if (!it.visible) lines.push('🚫 nascosto');
            card.innerHTML = '<div class="thumb" ' + (it.url ? ('style="background-image:url(\'' + it.url + '\')"') : '') + '></div>' +
              '<div class="nm">' + esc(it.name || it.nickname || 'Eroe') + '</div>' +
              '<div class="meta">' + lines.join('<br>') + '</div>' +
              (it.url ? ('<a class="dl" href="' + it.url + '" download target="_blank">⬇ Scarica</a> ') : '') +
              '<button class="dl" style="background:none;border:none;cursor:pointer;color:' + (it.visible ? '#ff9b9b' : '#7CD992') + '">' + (it.visible ? '🚫 Nascondi dalla home' : '✓ Mostra nella home') + '</button>';
            var btn = card.querySelector('button');
            btn.onclick = function () {
              btn.disabled = true; btn.textContent = '…';
              fetch('/api/hero-visibility', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: pw.value.trim(), id: it.id, visible: !it.visible }) })
                .then(function (r) { return r.ok; })
                .then(function (ok) { if (ok) load(); else { btn.disabled = false; btn.textContent = 'Errore, riprova'; } })
                .catch(function () { btn.disabled = false; btn.textContent = 'Errore di rete'; });
            };
            grid.appendChild(card);
          });
        })
        .catch(function () { msg.innerHTML = '<span class="bad">Errore di rete. Il deploy è attivo? Le env ADMIN_TOKEN e SUPABASE_SERVICE_ROLE_KEY sono impostate?</span>'; });
    }

    document.getElementById('go').onclick = load;
    pw.addEventListener('keydown', function (e) { if (e.key === 'Enter') load(); });
    logout.onclick = function () { localStorage.removeItem('syw_admin'); pw.value = ''; grid.innerHTML = ''; msg.textContent = ''; logout.style.display = 'none'; };
    if (saved) load();
  </script>
</body>
</html>
